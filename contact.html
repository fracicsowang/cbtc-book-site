.contact-hero { padding: 80px 0 64px; min-height: 60vh; display: flex; align-items: center; }

.contact-mode-icon { font-family: var(--serif); font-size: 28px; color: var(--amber); }
.contact-mode h3 { font-family: var(--serif); font-size: 22px; font-weight: 500; letter-spacing: -0.3px; margin: 0 0 4px; }
.contact-mode p { font-size: 14px; line-height: 1.5; color: var(--char-dim); margin: 0; }
.contact-mode a { font-family: var(--mono); font-size: 12px; letter-spacing: 1.6px; text-transform: uppercase; padding: 10px 16px; background: var(--navy); color: var(--ink); }
.contact-mode a:hover { background: var(--amber); color: var(--navy); }
.contact-card { background: var(--navy); color: var(--ink); padding: 40px; }
.contact-card-photo { width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block; margin: -40px -40px 24px; width: calc(100% + 80px); filter: grayscale(0.15) contrast(1.02); }
.contact-card h4 { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--amber); margin: 0 0 16px; }
.contact-card-name { font-family: var(--serif); font-size: 32px; font-weight: 400; letter-spacing: -0.6px; margin: 0 0 8px; }
.contact-card-tag { font-family: var(--mono); font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--ink-dim); margin: 0 0 24px; }
.contact-card p { font-size: 15px; line-height: 1.55; color: var(--ink-dim); margin: 0 0 16px; }
.contact-card-meta { padding-top: 16px; border-top: 1px solid var(--rule); margin-top: 16px; font-family: var(--mono); font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--ink-dim); }
.contact-card-meta div { padding: 6px 0; }
@media (max-width: 1024px) {
  .contact-grid { grid-template-columns: 1fr; gap: 48px; }
