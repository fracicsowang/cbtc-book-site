<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figures Gallery — Inside the Books</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css">
<style>
.fg-hero { padding: 80px 0 32px; }
.fg-h { font-family: var(--serif); font-size: clamp(36px, 4.5vw, 56px); font-weight: 400; letter-spacing: -1px; margin: 16px 0 16px; line-height: 1.05; max-width: 900px; text-wrap: balance; }
.fg-lede { font-size: 18px; line-height: 1.55; color: var(--char-dim); max-width: 720px; margin: 0 0 32px; }
.fg-stats { display: flex; gap: 48px; padding: 24px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); margin-top: 24px; flex-wrap: wrap; }
.fg-stat { display: flex; flex-direction: column; gap: 4px; }
.fg-stat .num { font-family: var(--serif); font-size: 36px; font-weight: 400; letter-spacing: -0.5px; }
.fg-stat .lab { font-family: var(--mono); font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--char-dim); }
.fg-toc { padding: 32px 0; background: var(--paper-2); border-bottom: 1px solid var(--rule); position: sticky; top: 0; z-index: 10; }
.fg-toc-grid { display: grid; grid-template-columns: 100px 1fr; gap: 24px; align-items: baseline; }
.fg-toc-label { font-family: var(--mono); font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--char-dim); }
.fg-toc-links { display: flex; flex-wrap: wrap; gap: 6px 4px; }
.fg-toc-links a { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; padding: 6px 10px; background: var(--paper); color: var(--navy); text-decoration: none; border: 1px solid var(--rule); transition: all 0.15s; }
.fg-toc-links a:hover { background: var(--navy); color: var(--paper); border-color: var(--navy); }
.fg-section { padding: 48px 0 32px; scroll-margin-top: 96px; }
.fg-section-h { display: flex; align-items: baseline; gap: 16px; padding-top: 16px; border-top: 2px solid var(--navy); margin-bottom: 32px; }
.fg-section-h h2 { font-family: var(--serif); font-size: 28px; font-weight: 400; letter-spacing: -0.4px; margin: 0; }
.fg-section-h .ch { font-family: var(--mono); font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--amber); }
.fg-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px; }
.fg-card { background: var(--paper-2); padding: 16px; }
.fg-card img { width: 100%; height: auto; display: block; }
.fg-cap { padding: 14px 4px 4px; display: flex; gap: 12px; align-items: baseline; }
.fg-cap .num { font-family: var(--mono); font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: var(--amber); font-weight: 500; }
.fg-cap .title { font-family: var(--serif); font-size: 16px; font-weight: 500; }
@media (max-width: 800px) { .fg-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
