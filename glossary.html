<title>CBTC Glossary — Terms, Acronyms, Standards</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/site.css">
<style>
.gloss-hero { padding: 64px 0 32px; }
.gloss-h { font-family: var(--serif); font-size: clamp(36px, 4.5vw, 56px); font-weight: 400; letter-spacing: -1px; margin: 16px 0 16px; line-height: 1.05; max-width: 900px; text-wrap: balance; }
.gloss-lede { font-size: 18px; line-height: 1.55; color: var(--char-dim); max-width: 720px; }
.gloss-stage { background: var(--navy); color: var(--ink); padding: 64px 0; }
.gloss-diagram { width: 100%; aspect-ratio: 16/8; background: var(--navy-deep); position: relative; overflow: hidden; }
.gloss-hot { position: absolute; cursor: pointer; transition: transform .15s; }
.gloss-hot:hover { transform: scale(1.08); }
.gloss-hot-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 0 6px var(--amber-soft); position: absolute; top: -7px; left: -7px; }
.gloss-hot-dot.active { background: var(--ink); box-shadow: 0 0 0 6px rgba(74,158,191,0.4); }
.gloss-hot-pulse { position: absolute; top: -7px; left: -7px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--amber); animation: pulse 2s infinite; opacity: 0.6; }
@keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2.5); opacity: 0; } }
.gloss-info { background: var(--navy-deep); border-top: 1px solid var(--rule); padding: 32px 0; min-height: 220px; }
.gloss-info-grid { display: grid; grid-template-columns: 200px 1fr; gap: 48px; align-items: start; }
.gloss-info-acro { font-family: var(--serif); font-size: 64px; font-weight: 400; letter-spacing: -2px; color: var(--amber); line-height: 0.9; }
.gloss-info-name { font-family: var(--serif); font-size: 28px; font-weight: 500; color: var(--ink); margin: 0 0 12px; }
.gloss-info-desc { font-size: 16px; line-height: 1.6; color: var(--ink-dim); margin: 0 0 16px; max-width: 720px; }
.gloss-info-ref { font-family: var(--mono); font-size: 11px; letter-spacing: 1.6px; text-transform: uppercase; color: var(--amber); }
.gloss-list { padding: 80px 0; }
.gloss-table { display: grid; grid-template-columns: 120px 1fr 2fr; gap: 24px; }
.gloss-row { display: contents; }
.gloss-row > * { padding: 16px 0; border-top: 1px solid var(--char-rule); }
.gloss-row .acro { font-family: var(--mono); font-size: 14px; font-weight: 500; color: var(--navy); letter-spacing: 1px; }
.gloss-row .name { font-family: var(--serif); font-size: 18px; font-weight: 500; }
.gloss-row .desc { font-size: 15px; line-height: 1.5; color: var(--char-dim); }
@media (max-width: 1024px) {
  .gloss-info-grid { grid-template-columns: 1fr; gap: 16px; }
  .gloss-info-acro { font-size: 48px; }
  .gloss-table { grid-template-columns: 1fr; }
  .gloss-row > * { padding: 8px 0; border-top: none; }
  .gloss-row { display: block; padding: 16px 0; border-top: 1px solid var(--char-rule); }
}
</style><!-- Google tag (gtag.js) -->

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="assets/data.js"></script>
<script type="text/babel" src="assets/components.jsx"></script>
<script type="text/babel">
const TERMS = [
  { acro: "ATP",  name: "Automatic Train Protection",  x: 24, y: 64, ref: "Vol 1 · Ch. 04",
    desc: "Onboard subsystem that supervises train movement and intervenes when speed or position would otherwise exceed the safe envelope. The safety-critical core of any CBTC system." },
  { acro: "ATO",  name: "Automatic Train Operation",   x: 28, y: 56, ref: "Vol 1 · Ch. 04",
    desc: "Driving automation layer that commands traction and braking under ATP supervision. Typically responsible for station-stopping accuracy, energy-optimized cruising, and door enable signals." },
  { acro: "ATS",  name: "Automatic Train Supervision", x: 84, y: 16, ref: "Vol 1 · Ch. 07",
    desc: "Central control-room system that supervises the entire CBTC railway: timetable execution, dispatching, regulation, and the operator HMI. Sits above ATP/ATO and the wayside zone controllers." },
  { acro: "ZC",   name: "Zone Controller",             x: 50, y: 30, ref: "Vol 1 · Ch. 05",
    desc: "Wayside computer that owns one geographic 'zone' of the railway. Tracks every train inside its zone, generates Movement Authorities, and hands off to neighbor ZCs at zone boundaries." },
  { acro: "DCS",  name: "Data Communication System",   x: 50, y: 42, ref: "Vol 1 · Ch. 06",
    desc: "The wireless network that carries train↔wayside data. Most US deployments use 2.4 GHz or 5 GHz licensed/unlicensed spread-spectrum radio with redundant access points along the right-of-way." },
  { acro: "MA",   name: "Movement Authority",          x: 64, y: 78, ref: "Vol 1 · Ch. 03",
    desc: "The signed promise from the wayside to a single train: 'you may proceed up to point X at speed Y.' CBTC's moving-block paradigm gives every train a continuously updated MA." },
  { acro: "GoA",  name: "Grades of Automation",        x: 14, y: 28, ref: "Vol 2 · Ch. 08",
    desc: "UITP/IEC framework defining who is responsible for which train function across five levels: GoA 0 (line-of-sight) to GoA 4 (unattended train operation). Most US transit deployments target GoA 2." },
  { acro: "OBCU", name: "Onboard Controller Unit",     x: 36, y: 76, ref: "Vol 1 · Ch. 04",
    desc: "Train-resident vital computer running the CBTC onboard logic: ATP supervision, ATO commands, balise reading, odometry fusion, and DCS communication with the wayside." },
];

function GlossaryPage() {
  const [active, setActive] = React.useState(0);
  const t = TERMS[active];
  return (<>
    <SiteNav active="glossary"/>
    <section className="gloss-hero">
      <div className="container">
        <span className="kicker">Interactive diagram</span>
        <h1 className="gloss-h">A CBTC system is eight letters apart from a fixed-block railway.</h1>
        <p className="gloss-lede">Click any node on the schematic below to see what each acronym means and where the book covers it. The full alphabetical glossary follows.</p>
      </div>
    </section>

    <section className="gloss-stage">
      <div className="container">
        <div className="gloss-diagram">
          <svg width="100%" height="100%" viewBox="0 0 1600 800" preserveAspectRatio="none">
            <defs>
              <pattern id="gridG" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4A9EBF" strokeWidth="0.5" opacity="0.18"/>
              </pattern>
            </defs>
            <rect width="1600" height="800" fill="url(#gridG)"/>
            {/* tracks */}
            <line x1="0" y1="600" x2="1600" y2="600" stroke="#EAF2F7" strokeWidth="2"/>
            <line x1="0" y1="640" x2="1600" y2="640" stroke="#EAF2F7" strokeWidth="2"/>
            {/* ties */}
            {Array.from({length: 60}).map((_,i) => <line key={i} x1={i*28} y1="600" x2={i*28} y2="640" stroke="#EAF2F7" strokeWidth="0.4" opacity="0.4"/>)}
            {/* radio arcs from ZC */}
            <g stroke="#4A9EBF" fill="none" opacity="0.4">
              <circle cx="800" cy="240" r="200"/>
              <circle cx="800" cy="240" r="280"/>
              <circle cx="800" cy="240" r="360"/>
            </g>
            {/* ZC tower */}
            <rect x="790" y="180" width="20" height="60" fill="#D4A84B"/>
            <line x1="800" y1="240" x2="800" y2="600" stroke="#D4A84B" strokeWidth="1" opacity="0.5"/>
            {/* ATS console */}
            <rect x="1300" y="80" width="200" height="100" fill="#1B2D4A" stroke="#4A9EBF"/>
            <text x="1400" y="140" fontFamily="IBM Plex Mono, monospace" fontSize="14" fill="#EAF2F7" textAnchor="middle">ATS · CONTROL CENTER</text>
            <line x1="1300" y1="180" x2="810" y2="240" stroke="#4A9EBF" strokeDasharray="4 4" strokeWidth="1"/>
            {/* train */}
            <rect x="500" y="595" width="180" height="50" fill="#D4A84B" stroke="#0A1628" strokeWidth="2"/>
            <text x="590" y="624" fontFamily="IBM Plex Mono, monospace" fontSize="14" fill="#0A1628" textAnchor="middle" fontWeight="700">TRAIN · 0274</text>
            {/* MA cone */}
            <path d="M 680 590 L 1050 590 L 1050 650 L 680 650 Z" fill="#D4A84B" opacity="0.18"/>
            <text x="900" y="700" fontFamily="IBM Plex Mono, monospace" fontSize="13" fill="#D4A84B" textAnchor="middle">MOVEMENT AUTHORITY</text>
            {/* labels */}
            <text x="800" y="170" fontFamily="IBM Plex Mono, monospace" fontSize="14" fill="#D4A84B" textAnchor="middle">ZC · WAYSIDE</text>
          </svg>

          {TERMS.map((term, i) => (
            <div className="gloss-hot" key={i} style={{ left: `${term.x}%`, top: `${term.y}%` }} onClick={() => setActive(i)}>
              <span className={`gloss-hot-dot ${active === i ? "active" : ""}`}/>
              {active !== i && <span className="gloss-hot-pulse"/>}
              <span style={{ position: "absolute", left: 22, top: -8, fontFamily: "var(--mono)", fontSize: 11, letterSpacing: 1.4, color: active === i ? "var(--ink)" : "var(--ink-dim)", whiteSpace: "nowrap" }}>{term.acro}</span>
            </div>
          ))}
        </div>

        <div className="gloss-info">
          <div className="gloss-info-grid">
            <div className="gloss-info-acro">{t.acro}</div>
            <div>
              <h3 className="gloss-info-name">{t.name}</h3>
              <p className="gloss-info-desc">{t.desc}</p>
              <span className="gloss-info-ref">↳ Covered in {t.ref}</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section className="container gloss-list">
      <span className="kicker">Alphabetical glossary</span>
      <h2 style={{ fontFamily: "var(--serif)", fontSize: 36, fontWeight: 400, letterSpacing: "-0.6px", margin: "16px 0 32px" }}>
        The eight terms above plus everything else CBTC procurement documents take for granted.
      </h2>
      <div className="gloss-table">
        {[...TERMS].sort((a, b) => a.acro.localeCompare(b.acro)).map((t, i) => (
          <div className="gloss-row" key={i}>
            <div className="acro">{t.acro}</div>
            <div className="name">{t.name}</div>
            <div className="desc">{t.desc}</div>
          </div>
        ))}
      </div>
    </section>

    <SiteFooter/>
  </>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<GlossaryPage/>);
</script>
</body>
</html>
